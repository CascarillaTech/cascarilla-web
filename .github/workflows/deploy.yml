name: Desplegar Cascarilla Tech en GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

env:
  BUILD_PATH: '.'
  # Forzamos a GitHub a usar Node 24 para evitar los avisos de deprecación
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Compilar proyecto
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Actualizado a Node 24
          cache: npm
          cache-dependency-path: ${{ env.BUILD_PATH }}/package-lock.json

      - name: Configurar GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Instalar dependencias
        run: npm ci
        working-directory: ${{ env.BUILD_PATH }}

      - name: Compilar con Astro
        run: npm run build
        working-directory: ${{ env.BUILD_PATH }}

      - name: Subir artefacto compilado
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_PATH }}/dist

  deploy:
    name: Publicar en GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4